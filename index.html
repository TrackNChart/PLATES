<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Page</title>
    <style>
        /* This applies the background to the whole page */
        body {
            background-image: url('loginUI.png');
            background-size: cover;       /* Makes image cover the screen */
            background-position: center;  /* Centers the image */
            background-repeat: no-repeat;
            min-height: 100vh;           /* Ensures body is full screen height */
            margin: 0;
            font-family: sans-serif;
        }

        p {
            background: rgba(255, 255, 255, 0.7); /* Adds a slight white overlay so text is readable */
            padding: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <h2 title="I'm a header">The title Attribute</h2>

    <p title="I'm a tooltip">Mouse over this paragraph to display the title attribute as a tooltip.</p>

</body>
</html>
